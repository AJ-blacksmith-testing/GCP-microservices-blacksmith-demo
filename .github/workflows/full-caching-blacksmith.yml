name: Full CI Benchmark - Blacksmith Optimized

on:
  workflow_dispatch:

jobs:
  go-unit-tests:
    name: Blacksmith Optimized - Go Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run Go unit tests
        run: |
          for GO_PACKAGE in "shippingservice" "productcatalogservice" "frontend/validator"; do
            echo "Testing $GO_PACKAGE..."
            pushd src/$GO_PACKAGE
            go test
            popd
          done

  csharp-unit-tests:
    name: Blacksmith Optimized - C# Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0'

      - name: Run C# unit tests
        run: |
          dotnet test src/cartservice/

  docker-builds:
    name: Blacksmith Optimized - Build Docker Image (${{ matrix.service }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - go-unit-tests
      - csharp-unit-tests

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            dockerfile: ./src/frontend/Dockerfile
            context: ./src/frontend

          - service: cartservice
            dockerfile: ./src/cartservice/src/Dockerfile
            context: ./src/cartservice/src

          - service: productcatalogservice
            dockerfile: ./src/productcatalogservice/Dockerfile
            context: ./src/productcatalogservice

          - service: checkoutservice
            dockerfile: ./src/checkoutservice/Dockerfile
            context: ./src/checkoutservice

          - service: currencyservice
            dockerfile: ./src/currencyservice/Dockerfile
            context: ./src/currencyservice

          - service: emailservice
            dockerfile: ./src/emailservice/Dockerfile
            context: ./src/emailservice

          - service: paymentservice
            dockerfile: ./src/paymentservice/Dockerfile
            context: ./src/paymentservice

          - service: recommendationservice
            dockerfile: ./src/recommendationservice/Dockerfile
            context: ./src/recommendationservice

          - service: shippingservice
            dockerfile: ./src/shippingservice/Dockerfile
            context: ./src/shippingservice

          - service: adservice
            dockerfile: ./src/adservice/Dockerfile
            context: ./src/adservice

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Blacksmith Docker builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build Docker image with Blacksmith layer cache
        uses: useblacksmith/build-push-action@v2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: online-boutique-${{ matrix.service }}:benchmark
